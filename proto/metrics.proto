syntax = "proto3";

option  go_package = "gopher-sre/proto";

package metrics;

message MetricReport {
    string host_id = 1;
    string host_name = 2;
    double cpu_usage_percent = 3;
    uint64 memory_used_bytes = 4;
    uint64 memory_total_bytes = 5;
    double disk_utilization = 6;
    int64 timestamp_unix = 7;
    map<string, string> labels = 8;
}

message Heartbeat {
    string host_id = 1;
    int64 timestamp_unix = 2;
    string version = 3;
}

